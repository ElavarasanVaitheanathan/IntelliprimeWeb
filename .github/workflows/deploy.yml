name: Deploy Java EE App

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build WAR
        run: mvn clean package

      - name: List built files
        run: ls -la target/

      # ✅ Clean previous deployment (SAFE)
      - name: Clean previous Tomcat deployment
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "Cleaning previous deployment..."
            rm -rf /opt/tomcat/webapps/IntelliprimeWeb
            rm -f /opt/tomcat/webapps/IntelliprimeWeb.war
            echo "Cleanup complete"

      # ✅ Copy WAR properly (IMPORTANT FIX)
      - name: Copy WAR to VM
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/IntelliprimeWeb.war"
          target: "/opt/tomcat/webapps/"

      # ✅ Restart Tomcat cleanly
      - name: Restart Tomcat
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "Restarting Tomcat..."
            cd /opt/tomcat/bin
            ./shutdown.sh || echo "Shutdown failed, continuing..."
            sleep 10
            ./startup.sh
            sleep 10
            echo "Tomcat status:"
            ps aux | grep tomcat